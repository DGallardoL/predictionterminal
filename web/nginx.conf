# Rate-limit zone (must be at http context — defined here, used in location below)
limit_req_zone $binary_remote_addr zone=apilimit:10m rate=30r/s;

server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # --- Security headers (global) -----------------------------------------
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Content-Security-Policy — blocks third-party script injection at the
    # browser. ``'unsafe-inline'`` is required for both scripts and styles
    # because ``index.html`` ships tens of thousands of lines of inline JS
    # + style attributes by design (vanilla-HTML target, ADR-0009). The CSP
    # therefore can't fully harden against same-origin XSS, but it DOES
    # block:
    #   • External script injection (only Plotly CDN allowed)
    #   • External stylesheet injection (only Google Fonts CSS allowed)
    #   • Object/embed tags
    #   • Cross-origin XHR/EventSource/WebSocket exfil (only our own origin)
    #   • Iframing the page (frame-ancestors 'none' — defense-in-depth with X-Frame-Options)
    # connect-src also allows the API on :8000 (and 127.0.0.1): in the
    # docker-compose layout the UI is served from :8080 but config.js points
    # fetch/EventSource cross-origin at the API on :8000, so 'self' alone makes
    # the browser's CSP block every API call (CORS allows it, but CSP runs
    # first). Listing the API origins here is what makes the UI actually load
    # data when the grader runs `docker-compose up`. (The single-app Fly deploy
    # serves UI + API same-origin, so it doesn't need these.)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://cdn.plot.ly 'unsafe-inline'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' http://localhost:8000 http://127.0.0.1:8000 ws://localhost:8000 ws://127.0.0.1:8000; manifest-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'" always;

    # Permissions-Policy — explicitly disable browser APIs the app does
    # NOT use, so a future XSS sink can't pivot into camera/geolocation/
    # payment flows. Matches OWASP ASVS L1 baseline.
    add_header Permissions-Policy "accelerometer=(), autoplay=(), camera=(), display-capture=(), document-domain=(), encrypted-media=(), fullscreen=(self), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), midi=(), payment=(), picture-in-picture=(), publickey-credentials-get=(), screen-wake-lock=(), sync-xhr=(self), usb=(), web-share=(), xr-spatial-tracking=()" always;

    # --- Compression --------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;
    gzip_min_length 1000;

    # --- Static assets with cache headers ----------------------------------
    location ~* \.(js|css|svg|png|jpg|woff2)$ {
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    # Static frontend
    location / {
        try_files $uri $uri/ =404;
    }

    # Proxy API calls to the FastAPI service.
    # The browser hits /api/fit; nginx forwards to api:8000/fit.
    location /api/ {
        limit_req zone=apilimit burst=50 nodelay;
        proxy_pass         http://api:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Generous timeouts for fits that hit cold cache
    proxy_connect_timeout 10s;
    proxy_send_timeout    60s;
}
