; Mutation-testing configuration for prediction-factor-model.
;
; Owner: W13-26 (mutation testing setup, wave-13)
; Tool:  mutmut (https://mutmut.readthedocs.io)
;
; Usage:
;   pip install mutmut
;   python api/scripts/run_mutation_tests.py --module pfm.model
;
; Notes:
; - The runner script (api/scripts/run_mutation_tests.py) is the supported
;   entry point. It overrides `paths_to_mutate` and `tests_dir` per-module
;   so this file mainly carries shared defaults (runner cmd, excludes,
;   timeout, simple-output flag).
; - We pin `runner` to pytest with `-x -q --tb=no` so each mutant is killed
;   as early as possible (mutmut treats first failure as a kill).
; - `also_copy` is empty; mutmut copies the working tree by default and the
;   runner uses PYTHONPATH=api/src so imports resolve.
; - Acceptance threshold (enforced in the runner, not here): >=80% kill
;   rate for production-critical modules (pfm.model, pfm.regression_core,
;   pfm.cache_pool, pfm.terminal.jumps).

[mutmut]
; Default target if invoked without args. Prefer the runner script instead.
paths_to_mutate=api/src/pfm/model.py
tests_dir=api/tests
runner=cd api && PYTHONPATH=src .venv/bin/python -m pytest -x -q --tb=no --disable-warnings
backup=False
simple_output=True
; Per-mutant pytest timeout (seconds). model.py OLS fits are fast; jumps a bit slower.
; Mutmut multiplies baseline runtime by ~2 internally, so this is an upper cap.
CI=False

; Patterns mutmut should never mutate (regex on file path).
; Exclude __init__, tests themselves, generated openapi, and large data routers
; whose value is e2e-tested, not unit-tested.
exclude=
    .*/__init__\.py
    .*/tests/.*
    .*_test\.py
    .*/schemas\.py
    .*/main\.py
    .*/factors\.yml
